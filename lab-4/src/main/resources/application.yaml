spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/labdb
    username: labuser
    password: labpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

server:
  address: 0.0.0.0
  port: 4201