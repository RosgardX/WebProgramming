version: "3.8"

services:
  db:
    image: postgres:15
    container_name: pointsdb
    environment:
      POSTGRES_DB: pointsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  wildfly:
    image: points-lab
    container_name: points-lab
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "9990:9990"

volumes:
  db_data: